name: Robotics Job Scout

on:
  schedule:
    - cron: '0 * * * *'   # every hour, on the hour
  workflow_dispatch:

permissions:
  contents: write          # needed to commit state.json back to repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv --quiet

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('uv.lock', 'pyproject.toml') }}
          restore-keys: uv-${{ runner.os }}-

      - name: Install job-scout
        run: uv pip install --system -e ".[tls]"

      - name: Install company scraper deps
        run: |
          uv pip install --system requests playwright
          playwright install chromium --with-deps

      - name: Restore job-scout database
        uses: actions/cache@v4
        with:
          path: ~/.local/share/job-scout/
          key: job-scout-db-robotics-${{ github.run_number }}
          restore-keys: |
            job-scout-db-robotics-

      - name: Inject Discord webhook URL
        env:
          DISCORD_WEBHOOK_JOBS: ${{ secrets.DISCORD_WEBHOOK_JOBS }}
        run: |
          sed -i "s|DISCORD_WEBHOOK_URL_PLACEHOLDER|${DISCORD_WEBHOOK_JOBS}|g" config.robotics.yaml

      # ── Agent 1: job boards (LinkedIn, Google) ─────────────────────────
      - name: Run job-board scraper
        run: job-scout --config config.robotics.yaml scrape

      # ── Agent 2: direct company career pages (Lever/Greenhouse/Playwright) ──
      - name: Run company career page scraper
        working-directory: company_scraper
        env:
          DISCORD_WEBHOOK_JOBS: ${{ secrets.DISCORD_WEBHOOK_JOBS }}
        run: python main.py

      # Commit updated state.json so next run only alerts on truly new jobs
      - name: Save company scraper state
        run: |
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add company_scraper/state.json
          git diff --staged --quiet || git commit -m "chore: update company scraper state [skip ci]"
          # Discard the sed-injected webhook URL before rebasing (not needed in git)
          git restore config.robotics.yaml 2>/dev/null || git checkout -- config.robotics.yaml
          git push || (git pull --rebase origin main && git push)
