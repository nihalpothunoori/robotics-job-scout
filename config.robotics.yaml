    - "Staff"
    - "Lead"
    - "Principal"
    - "Engineer"
    - "Scientist"
    - "Intern"

  title_signals:
    # --- Intern signals (fall 2026 / summer 2027) ---
    - pattern: "fall 2026"
      points: 20
    - pattern: "summer 2027"
      points: 20
    - pattern: "fall 2025"
      points: 15
    - pattern: "summer 2026"
      points: 18
    - pattern: "intern"
      points: 12
    - pattern: "internship"
      points: 12
    # --- Full-time robotics signals ---
    - pattern: "robot learning"
      points: 20
    - pattern: "embodied AI"
      points: 18
    - pattern: "embodied"
      points: 15
    - pattern: "VLA"
      points: 20
    - pattern: "world model"
      points: 18
    - pattern: "reinforcement learning"
      points: 15
    - pattern: "robotics"
      points: 12
    - pattern: "robot"
      points: 12
    - pattern: "autonomous"
      points: 10
    - pattern: "perception"
      points: 10
    - pattern: "research engineer"
      points: 8
    - pattern: "research scientist"
      points: 8
    - pattern: "machine learning engineer"
      points: 6
    - pattern: "software engineer"
      points: 5

search:
  terms:
    # Full-time roles
    - "software engineer robotics"
    - "machine learning engineer robotics"
    - "robot learning engineer"
    - "embodied AI engineer"
    - "autonomous systems engineer"
    - "reinforcement learning engineer"
    - "robotics engineer"
    - "perception engineer"
    # Intern roles — fall 2026 and summer 2027
    - "robotics software engineer intern fall 2026"
    - "robotics software engineer intern summer 2027"
    - "machine learning intern robotics 2026"
    - "machine learning intern robotics 2027"
    - "robot learning intern"
    - "embodied AI intern"
  locations:
    - "United States"
    - "Remote"
  sites:
    - linkedin
    - indeed
    - google
    - twitter
  results_per_site: 20
  hours_old: 24          # look back 24 hrs; DB deduplication prevents duplicate alerts
  distance_miles: 100

scraping:
  delay_min_seconds: 3.0
  delay_max_seconds: 8.0
  request_timeout: 20
  max_retries: 2
  max_pages: 3
  fetch_descriptions: true
  use_tls_fingerprinting: false
  max_workers: 3

scoring:
  min_alert_score: 30    # low enough to catch all relevant hits at target companies
  min_display_score: 20
  alert_states: []       # alert for all states + remote

notifications:
  macos:
    enabled: false       # running headless on GitHub Actions
  email:
    enabled: false
  telegram:
    enabled: false
  slack:
    enabled: false
  discord:
    enabled: true
    webhook_url: "DISCORD_WEBHOOK_URL_PLACEHOLDER"

schedule:
  interval_hours: 1
