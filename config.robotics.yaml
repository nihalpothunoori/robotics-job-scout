search:
  terms:
    # Broad robotics intern searches
    - "robotics software engineer intern 2026 2027"
    - "robot learning embodied AI intern"
    - "autonomous systems machine learning intern"
    # Company-specific: companies not reachable via direct API
    # (Ashby private boards, Workday, custom ATS)
    - "Physical Intelligence intern 2026 2027"
    - "1X Technologies intern 2026 2027"
    - "Boston Dynamics intern 2026 2027"
    - "Tesla robotics intern 2026 2027"
    - "NVIDIA robotics intern 2026 2027"
    - "Skydio software intern 2026 2027"
    - "Aurora software intern 2026 2027"
    - "Covariant AI intern 2026 2027"
    - "OpenAI robotics intern 2026 2027"
    - "Joby Aviation software intern 2026 2027"
    - "Saildrone software intern 2026 2027"
    - "Intuitive Surgical software intern 2026 2027"
    - "Ghost Robotics software intern 2026 2027"
    - "Skild AI intern 2026 2027"
    - "Collaborative Robotics intern 2026 2027"
