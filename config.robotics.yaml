scraping:
  delay_min_seconds: 2.0
  delay_max_seconds: 5.0
  request_timeout: 15
  max_retries: 1
  max_pages: 2
  fetch_descriptions: false    # skip per-job detail fetch — saves ~60% of runtime
  use_tls_fingerprinting: true
  max_workers: 6

scoring:
  min_alert_score: 25
  min_display_score: 15
  alert_states: []

notifications:
  macos:
    enabled: false
  email:
    enabled: false
  telegram:
    enabled: false
  slack:
    enabled: false
  discord:
    enabled: true
    webhook_url: "DISCORD_WEBHOOK_URL_PLACEHOLDER"

schedule:
  interval_hours: 1
